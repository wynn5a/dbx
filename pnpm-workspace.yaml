packages:
  - "packages/*"

# Native deps whose install/build scripts must run.
# pnpm v11 no longer reads the `pnpm` field from package.json and uses the
# `allowBuilds` map here (it replaced the deprecated `onlyBuiltDependencies`).
allowBuilds:
  better-sqlite3: true
  esbuild: true
  keytar: true
  vue-demi: true
