name: Release Cache Warm

# Tag-triggered workflows (release.yml) can only restore caches from the
# default branch — never from another tag. So a v1.2.4 release cannot reuse
# the cache built by v1.2.3 directly. This workflow runs on main and writes
# the release-profile DEPENDENCY cache, keyed by major version, so every
# v<major>.x.x release restores a single shared, warm cache.
#
# Scope: rust-cache only keeps dependency artifacts — it purges the workspace
# crates (dbx, dbx-core, dbx-web) from the cache on save. The cacheable set
# therefore only changes when Cargo.lock / Cargo.toml / the toolchain change,
# which is exactly when this runs. (The old design warmed on every push to
# main: four full release builds per merge whose most expensive output — the
# workspace build + LTO link — was 100% discarded.)
on:
  push:
    branches: [main]
    paths:
      - 'Cargo.lock'
      - 'Cargo.toml'
      - 'src-tauri/Cargo.toml'
      - 'crates/*/Cargo.toml'
      - 'rust-toolchain*'
      - '.github/workflows/release-cache.yml'
  schedule:
    # Weekly keep-alive: restoring a cache resets GitHub's 7-day eviction
    # clock, and a new stable rustc (new cache key) gets re-warmed here.
    - cron: '0 3 * * 1'
  workflow_dispatch:

concurrency:
  group: release-cache-${{ github.ref }}
  cancel-in-progress: false

jobs:
  warm:
    strategy:
      fail-fast: false
      # Mirror release.yml exactly: same runners + targets, so the cached
      # artifacts match what the release build consumes.
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-15-intel
            target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: windows-2022
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Compute cache major version
        id: cache_ver
        shell: bash
        run: |
          # Cache key tracks the major version of the in-development version on
          # main, so it lines up with the tags cut from this branch.
          MAJOR=$(node -p "require('./package.json').version.split('.')[0]")
          echo "major=${MAJOR}" >> "$GITHUB_OUTPUT"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Two extra hashes are baked into the shared-key:
      #
      # - Root Cargo.toml, because rust-cache only hashes workspace MEMBER
      #   manifests + Cargo.lock — the virtual workspace root (where
      #   [profile.release] lives) never enters its key. Without this, a
      #   profile change (e.g. the LTO mode) reuses the old key, hits the
      #   existing cache, and silently skips saving the rebuilt artifacts
      #   (GitHub caches are immutable).
      # - This workflow file itself, so any change to HOW the cache is warmed
      #   (build command, env, features) forces a fresh key and an actual
      #   save instead of an exact hit on a stale cache.
      - name: Rust cache
        id: rust_cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './ -> target'
          shared-key: release-v${{ steps.cache_ver.outputs.major }}-${{ matrix.target }}-${{ hashFiles('Cargo.toml', '.github/workflows/release-cache.yml') }}
          cache-on-failure: true
          save-if: ${{ github.ref == 'refs/heads/main' }}

      # Everything below is skipped on an exact cache hit: the key already
      # exists, so rust-cache would skip saving and the build output would be
      # discarded. This makes the weekly keep-alive and version-bump-triggered
      # runs nearly free (restore refreshes GitHub's 7-day eviction clock).

      - name: Install system dependencies (Linux)
        if: startsWith(matrix.platform, 'ubuntu') && steps.rust_cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev xdg-utils

      - name: Setup pnpm
        if: steps.rust_cache.outputs.cache-hit != 'true'
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        if: steps.rust_cache.outputs.cache-hit != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend dependencies
        if: steps.rust_cache.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

      # tauri::generate_context! only needs a dist directory to exist at
      # compile time; its contents only affect the dbx crate's own artifacts,
      # which rust-cache purges from the cache anyway. A stub dist (plus the
      # cleared beforeBuildCommand below) replaces the vite build.
      - name: Stub frontend dist
        if: steps.rust_cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          mkdir -p dist
          echo '<!doctype html><title>cache warm stub</title>' > dist/index.html

      - name: Clear beforeBuildCommand
        if: steps.rust_cache.outputs.cache-hit != 'true'
        shell: bash
        run: node .github/scripts/set-release-version.mjs "$(node -p "require('./package.json').version")"

      # Warm through the same entry point the release uses (`tauri build`),
      # not a bare `cargo build`: the tauri CLI adds --features
      # tauri/custom-protocol and injects env like MACOSX_DEPLOYMENT_TARGET
      # into the cargo invocation, and any mismatch there changes crate
      # fingerprints — a bare-cargo warm left every cc-built/objc2 crate
      # (ring, aws-lc-sys, libduckdb-sys, the whole tauri/wry stack on macOS)
      # recompiling on each release despite a "hit" cache. --no-bundle stops
      # after the cargo build; packaging output is not cacheable anyway.
      - name: Warm release build cache
        if: steps.rust_cache.outputs.cache-hit != 'true'
        run: pnpm tauri build --target ${{ matrix.target }} --no-bundle
