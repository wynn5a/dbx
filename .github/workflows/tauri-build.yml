name: Tauri Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-15-intel
            target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          # Pinned to windows-2022 (VS 2022, MSVC 14.4x). windows-latest moved
          # to windows-2025 with VS 2026 (MSVC 14.51), which removed
          # stdext::checked_array_iterator — a symbol DuckDB's bundled fmt
          # (libduckdb-sys) still references, breaking the MSVC build. See
          # https://github.com/fmtlib/fmt/issues/3540
          - platform: windows-2022
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Install frontend dependencies
        run: pnpm install

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Compute cache major version
        id: cache_ver
        shell: bash
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          # Share one cache across an entire major series (all v1.x.x, etc.).
          # The cache is written on main by release-cache.yml; tag runs can only
          # restore caches from the default branch, never from another tag.
          MAJOR="${TAG_NAME#v}"
          MAJOR="${MAJOR%%.*}"
          echo "major=${MAJOR}" >> "$GITHUB_OUTPUT"

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './ -> target'
          shared-key: release-v${{ steps.cache_ver.outputs.major }}-${{ matrix.target }}
          # Restore the major-version cache main warmed; never save. A tag's
          # cache is isolated to that tag, so saving just wastes the 10 GB
          # repo budget without ever being reused.
          save-if: false

      - name: Install system dependencies (Linux)
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev xdg-utils

      # This workflow does not have the updater signing key, so skip
      # generating updater artifacts (which would otherwise fail the build).
      # Also sync the app version to the release tag so artifacts are not
      # built with the stale version committed in tauri.conf.json.
      - name: Disable updater artifacts and set version from tag
        shell: bash
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_NAME#v}" node -e "
            const fs = require('fs');
            const version = process.env.VERSION;
            if (!/^[0-9]+\.[0-9]+\.[0-9]+/.test(version)) {
              console.error('Tag does not contain a semver version: ' + version);
              process.exit(1);
            }
            const path = 'src-tauri/tauri.conf.json';
            const conf = JSON.parse(fs.readFileSync(path, 'utf8'));
            conf.bundle.createUpdaterArtifacts = false;
            conf.version = version;
            fs.writeFileSync(path, JSON.stringify(conf, null, 2));
            const pkgPath = 'package.json';
            const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
            pkg.version = version;
            fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2));
          "

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'DBX ${{ github.ref_name }}'
          releaseBody: 'DBX ${{ github.ref_name }}'
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}
